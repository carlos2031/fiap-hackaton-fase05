services:
  postgres:
    image: postgres:16-alpine
    container_name: stride-db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_DB: security_analyzer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: stride-app
    restart: unless-stopped
    mem_limit: 2g
    ports:
      - "8501:8501"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: security_analyzer
      DB_USER: postgres
      DB_PASSWORD: postgres
      LOG_LEVEL: INFO
      MODEL_CONFIDENCE: "0.25"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
